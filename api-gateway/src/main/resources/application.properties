spring.application.name=api-gateway
server.port=8765
spring.cloud.gateway.discovery.locator.enabled=true


spring.cloud.gateway.routes[0].id=quiz-service
spring.cloud.gateway.routes[0].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/quiz/**


spring.cloud.gateway.routes[1].id=admin-quiz-service
spring.cloud.gateway.routes[1].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/quiz/**


spring.cloud.gateway.routes[2].id=admin-question-service
spring.cloud.gateway.routes[2].uri=lb://QUESTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/question/**

spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/user/**


